name: Publish Mobile Update

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"

concurrency:
  group: publish-mobile-update-main
  cancel-in-progress: false

jobs:
  publish-mobile-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check publish prerequisites
        id: publish-gate
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::notice::EXPO_TOKEN is not configured. Skipping mobile OTA publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! jq -e '.expo.updates.url and .expo.extra.eas.projectId' apps/mobile/app.json > /dev/null; then
            echo "::warning::apps/mobile/app.json is missing Expo EAS update configuration. Skipping mobile OTA publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Install mobile dependencies
        if: steps.publish-gate.outputs.should_publish == 'true'
        run: npm --prefix apps/mobile ci

      - name: Mobile typecheck
        if: steps.publish-gate.outputs.should_publish == 'true'
        run: npm --prefix apps/mobile run typecheck

      - name: Publish OTA update to production branch
        if: steps.publish-gate.outputs.should_publish == 'true'
        working-directory: apps/mobile
        run: npx --yes eas-cli@latest update --branch production --message "main ${GITHUB_SHA::7}" --non-interactive
