name: Deploy API (Vercel)

on:
  push:
    branches:
      - main
    paths:
      - "services/api/functions/**"
      - ".github/workflows/deploy-api-vercel.yml"

concurrency:
  group: deploy-api-vercel-main
  cancel-in-progress: false

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secret: VERCEL_API_PROJECT_ID (or fallback VERCEL_PROJECT_ID)"
            exit 1
          fi

      - name: Install API dependencies
        run: npm --prefix services/api/functions ci

      - name: Validate API checks
        run: ./services/api/scripts/prepush-check.sh

      - name: Deploy API to Vercel
        working-directory: services/api/functions
        run: |
          npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --yes --prod --token="$VERCEL_TOKEN"
