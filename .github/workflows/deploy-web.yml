name: Deploy Web App

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"

concurrency:
  group: deploy-web-main
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      API_BACKEND_BASE_URL: ${{ vars.API_BACKEND_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secret: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Build web app
        run: npm --prefix apps/web run build

      - name: Deploy web app to Vercel
        working-directory: apps/web
        run: |
          npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
